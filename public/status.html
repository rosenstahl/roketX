<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoketX - Status</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #171614;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 900;
            color: #ff4d00;
        }
        .status {
            padding: 12px 20px;
            background-color: #33a335;
            border-radius: 4px;
            display: inline-block;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀 RoketX</div>
        <h1>Server-Status</h1>
        <p>Der RoketX Server ist aktiv und läuft. Wir führen gerade ein Update unserer Website durch. Bitte besuchen Sie uns später wieder.</p>
        <div class="status">Server aktiv</div>
    </div>
</body>
</html>
